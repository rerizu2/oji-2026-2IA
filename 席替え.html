<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7×7グリッド 席替えツール（印刷サイズ調整版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  /* 印刷用の変数（JavaScriptで書き換えます） */
  --print-scale: 1.0;
  --base-seat-w: 130px;
  --base-seat-h: 85px;
  --base-font: 1.1em;
}

body {
  font-family: "Yu Gothic", "Segoe UI", sans-serif;
  background: #f0f3f9;
  display: flex; justify-content: center; align-items: flex-start;
  gap: 20px; padding: 20px; flex-wrap: wrap;
}

.side-panel { width: 320px; }
.main-panel { flex: 1; min-width: 800px; }

.container {
  background: #fff; border-radius: 10px; padding: 20px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1); margin-bottom: 20px;
}

/* コントロールパネル */
.control-panel {
  display: flex; justify-content: center; align-items: center;
  gap: 15px; margin-bottom: 15px; flex-wrap: wrap; background: #f9f9f9; padding: 15px; border-radius: 8px;
}
.scale-ctrl { display: flex; align-items: center; gap: 10px; background: #fff; padding: 5px 15px; border-radius: 20px; border: 1px solid #ddd; }

select, button, input { padding: 8px 12px; font-size: 1em; border-radius: 6px; border: 1px solid #888; }
button { background: linear-gradient(180deg, #e0e0e0, #bdbdbd); cursor: pointer; }
#pdfBtn { background: linear-gradient(180deg, #ff8a65, #e64a19); color: white; border: none; font-weight: bold; }

/* 座席スタイル */
.teacher { 
  text-align:center; font-weight:bold; padding:10px; 
  border:2px solid #333; background:#e1f0ff; 
  width: 300px; margin: 15px auto;
}
.row { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }

.seat { 
  width: 100px; height: 65px; background:#fff; border:1px solid #444; 
  border-radius:4px; display:flex; align-items:center; justify-content:center; 
  flex-direction:column; position: relative; font-size: 0.85em;
}
.seat.fixed { background:#d6f5ff !important; -webkit-print-color-adjust: exact; }
.seat.hidden-spacer { border:1px dashed #ccc; background:rgba(0,0,0,0.02); }

/* PDF用（教職員用）の拡大適用エリア */
#teacherPdfArea {
  width: fit-content; margin: 0 auto; padding: 20px; background: white;
}
#teacherPdfArea .seat {
  width: calc(var(--base-seat-w) * var(--print-scale));
  height: calc(var(--base-seat-h) * var(--print-scale));
  font-size: calc(var(--base-font) * var(--print-scale));
}
#teacherPdfArea .row { gap: calc(10px * var(--print-scale)); margin-bottom: calc(10px * var(--print-scale)); }
#teacherPdfArea .view-label { font-size: calc(1.5em * var(--print-scale)); }
#teacherPdfArea rt { font-size: 0.6em; }

/* その他 */
textarea { width: 100%; height: 100px; box-sizing: border-box; padding: 8px; resize: none; }
table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 10px; }
th, td { border:1px solid #ccc; padding:4px; text-align:center; font-size: 0.8em; }
#miniSeating { display:flex; flex-direction:column; gap:5px; margin-top:10px; }
.miniRow { display:flex; justify-content:center; gap:5px; }
.miniSeat { width:30px; height:20px; border:1px solid #444; cursor:pointer; font-size:0.6em; display:flex; align-items:center; justify-content:center; }
.miniSeat.selected { background:#a5d6a7; }
</style>
</head>
<body>

<div class="side-panel">
  <div class="container">
    <h2>名前入力</h2>
    <textarea id="nameInput" placeholder="田中太郎 たなかたろう&#10;佐藤花子 さとうはなこ"></textarea>
    <button id="addNamesBtn" style="width:100%; margin-top:10px;">名簿を更新</button>
    <div id="miniSeating"></div>
  </div>

  <div class="container">
    <h3>出席番号管理</h3>
    <table id="studentTable">
      <thead>
        <tr><th style="width:30px;">番</th><th>氏名</th><th>ふりがな</th><th style="width:35px;">固定</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <button id="addRowBtn" style="width:100%; margin-top:10px;">＋ 行を追加</button>
  </div>
</div>

<div class="main-panel">
  <div class="container">
    <div class="control-panel">
      <div>
        シャッフル：<select id="shuffleCount"></select>
        <button id="shuffleBtn">実行</button>
      </div>
      
      <div class="scale-ctrl">
        <span>印刷サイズ:</span>
        <input type="range" id="scaleSlider" min="0.5" max="1.5" step="0.05" value="1.0">
        <span id="scaleValue">100%</span>
      </div>

      <button id="pdfBtn">📄 PDF出力</button>
      <button id="saveBtn">💾 保存</button>
      <button id="resetBtn">🗑 削除</button>
    </div>
    <p id="statusText" style="text-align:center; height:1em; color:#d32f2f; font-weight:bold; margin:0;"></p>
  </div>

  <div class="container">
    <div style="text-align:center; color:#1976d2; font-weight:bold; margin-bottom:5px;">【学生用表示】</div>
    <div class="teacher">教卓</div>
    <div id="seatingAreaStudent"></div>
  </div>

  <div class="container" style="overflow-x: auto;">
    <div id="teacherPdfArea">
      <div class="view-label" contenteditable="true" style="text-align:center; font-weight:bold; margin-bottom:15px;">令和　年度 ○年○組 座席表</div>
      <div id="seatingAreaTeacher"></div>
      <div class="teacher" style="margin-top:20px;">教卓</div>
    </div>
  </div>
</div>

<script>
const ROWS = 7;
const COLS = 7;
const tbody = document.querySelector("#studentTable tbody");
const areaStudent = document.getElementById("seatingAreaStudent");
const areaTeacher = document.getElementById("seatingAreaTeacher");
const hiddenSeats = new Set();
let currentStudentOrder = [];

// --- サイズ調整機能 ---
const scaleSlider = document.getElementById("scaleSlider");
const scaleValue = document.getElementById("scaleValue");
scaleSlider.addEventListener("input", (e) => {
  const val = e.target.value;
  scaleValue.textContent = Math.round(val * 100) + "%";
  document.documentElement.style.setProperty('--print-scale', val);
});

/* テーブル管理 */
function createRow(num = "", name = "", kana = "", checked=false) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><span contenteditable="true" style="display:block;">${num}</span></td>
    <td><span contenteditable="true" style="display:block; text-align:left;">${name}</span></td>
    <td><span contenteditable="true" style="display:block; text-align:left;">${kana}</span></td>
    <td><input type="checkbox" ${checked?"checked":""}></td>`;
  tr.querySelector("input").addEventListener("change", ()=>{
    tr.classList.toggle("checked", tr.querySelector("input").checked);
    syncOrderFromTable(); renderAll();
  });
  if(checked) tr.classList.add("checked");
  tbody.appendChild(tr);
}

function syncOrderFromTable() {
  const tableData = getCurrentStudentsFromTable();
  currentStudentOrder.forEach(s => {
    const match = tableData.find(t => t.num === s.num);
    if(match) { s.name = match.name; s.kana = match.kana; s.checked = match.checked; }
  });
}

function getCurrentStudentsFromTable(){
  const arr=[];
  tbody.querySelectorAll("tr").forEach(tr=>{
    const spans = tr.querySelectorAll("span");
    const checked = tr.querySelector("input").checked;
    arr.push({num: spans[0].textContent.trim(), name: spans[1].textContent.trim(), kana: spans[2].textContent.trim(), checked});
  });
  return arr;
}

function renderMiniSeats() {
  const mini = document.getElementById("miniSeating"); mini.innerHTML = "";
  for(let r=0; r<ROWS; r++){
    const rowDiv = document.createElement("div"); rowDiv.className = "miniRow";
    for(let c=0; c<COLS; c++) {
      const s = document.createElement("div"); s.className = "miniSeat";
      const key = `${r}-${c}`;
      if(hiddenSeats.has(key)) s.classList.add("selected");
      s.addEventListener("click", () => {
        if(hiddenSeats.has(key)) hiddenSeats.delete(key); else hiddenSeats.add(key);
        renderMiniSeats(); renderAll();
      });
      rowDiv.appendChild(s);
    }
    mini.appendChild(rowDiv);
  }
}

function doShuffleProcess() {
  const allStudents = getCurrentStudentsFromTable().filter(s => s.name !== "");
  const fixedOnes = allStudents.filter(s => s.checked);
  const flexOnes = allStudents.filter(s => !s.checked);
  for(let i=flexOnes.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [flexOnes[i], flexOnes[j]] = [flexOnes[j], flexOnes[i]];
  }
  currentStudentOrder = [...fixedOnes, ...flexOnes];
  renderAll();
}

function renderAll() {
  if(currentStudentOrder.length === 0) currentStudentOrder = getCurrentStudentsFromTable().filter(s => s.name !== "");
  const seatMap = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
  let sIdx = 0;
  for(let r=0; r<ROWS; r++) {
    for(let c=0; c<COLS; c++) {
      if(!hiddenSeats.has(`${r}-${c}`) && sIdx < currentStudentOrder.length) {
        seatMap[r][c] = currentStudentOrder[sIdx]; sIdx++;
      }
    }
  }
  renderView(areaStudent, seatMap, false);
  renderView(areaTeacher, seatMap, true);
}

function renderView(container, seatMap, isReverse) {
  container.innerHTML = "";
  const rIdx = isReverse ? [...Array(ROWS).keys()].reverse() : [...Array(ROWS).keys()];
  const cIdx = isReverse ? [...Array(COLS).keys()].reverse() : [...Array(COLS).keys()];
  rIdx.forEach(r => {
    const rowDiv = document.createElement("div"); rowDiv.className = "row";
    cIdx.forEach(c => {
      const seatEl = document.createElement("div"); seatEl.className = "seat";
      if(hiddenSeats.has(`${r}-${c}`)) { seatEl.classList.add("hidden-spacer"); }
      else {
        const s = seatMap[r][c];
        if(s) {
          seatEl.innerHTML = `<div style="font-size:0.6em; color:#666; position:absolute; top:2px; left:4px;">${s.num}</div>
                              <div style="font-weight:bold;"><ruby>${s.name}<rt>${s.kana}</rt></ruby></div>`;
          if(s.checked) seatEl.classList.add("fixed");
        }
      }
      rowDiv.appendChild(seatEl);
    });
    container.appendChild(rowDiv);
  });
}

document.getElementById("addNamesBtn").addEventListener("click", () => {
  const lines = document.getElementById("nameInput").value.split("\n").filter(l=>l.trim()!=="");
  tbody.innerHTML = "";
  lines.forEach((line, i) => {
    const parts = line.trim().split(/[\s　]+/);
    createRow(i+1, parts[0] || "", parts[1] || "");
  });
  currentStudentOrder = getCurrentStudentsFromTable().filter(s => s.name !== "");
  renderAll();
});

document.getElementById("shuffleBtn").addEventListener("click", () => {
  const times = parseInt(document.getElementById("shuffleCount").value);
  let count = 0; const status = document.getElementById("statusText");
  const timer = setInterval(() => {
    doShuffleProcess(); count++;
    status.textContent = `席替え中... (${count}/${times})`;
    if(count >= times) { clearInterval(timer); status.textContent = "完了！"; setTimeout(()=>status.textContent="",2000); }
  }, 80);
});

document.getElementById("pdfBtn").addEventListener("click", () => {
  const element = document.getElementById("teacherPdfArea");
  const opt = {
    margin: 5, filename: '座席表.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
  };
  html2pdf().set(opt).from(element).save();
});

document.getElementById("saveBtn").addEventListener("click", () => {
  syncOrderFromTable();
  const data = { scale: scaleSlider.value, students: currentStudentOrder, tableData: getCurrentStudentsFromTable(), hidden: Array.from(hiddenSeats) };
  localStorage.setItem("seatingData_v4", JSON.stringify(data));
  alert("保存しました");
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if(confirm("リセットしますか？")) { localStorage.removeItem("seatingData_v4"); location.reload(); }
});

document.getElementById("addRowBtn").addEventListener("click", () => createRow(tbody.rows.length+1, "", ""));

window.addEventListener("DOMContentLoaded", () => {
  const sel = document.getElementById("shuffleCount");
  for(let i=1; i<=50; i++) {
    const opt = document.createElement("option"); opt.value = i; opt.textContent = i + "回";
    if(i===10) opt.selected = true; sel.appendChild(opt);
  }
  const saved = localStorage.getItem("seatingData_v4");
  if(saved) {
    const data = JSON.parse(saved);
    if(data.scale) {
      scaleSlider.value = data.scale;
      scaleValue.textContent = Math.round(data.scale * 100) + "%";
      document.documentElement.style.setProperty('--print-scale', data.scale);
    }
    data.tableData.forEach(s => createRow(s.num, s.name, s.kana, s.checked));
    currentStudentOrder = data.students;
    if(data.hidden) data.hidden.forEach(h => hiddenSeats.add(h));
  } else { for(let i=1; i<=40; i++) createRow(i, "", ""); }
  renderMiniSeats(); renderAll();
});
</script>
</body>
</html>
