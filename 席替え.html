<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7×7席替えツール（別窓表示対応版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --print-scale: 1.0;
  --base-seat-w: 130px;
  --base-seat-h: 85px;
  --base-font: 1.1em;
}

body {
  font-family: "Yu Gothic", "Segoe UI", sans-serif;
  background: #f0f3f9;
  display: flex; justify-content: center; align-items: flex-start;
  gap: 20px; padding: 20px; flex-wrap: wrap;
}

.side-panel { width: 330px; }
.main-panel { flex: 1; min-width: 800px; }

.container {
  background: #fff; border-radius: 10px; padding: 20px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1); margin-bottom: 20px;
}

.control-panel {
  display: flex; justify-content: center; align-items: center;
  gap: 15px; margin-bottom: 15px; flex-wrap: wrap; background: #eef2f7; padding: 15px; border-radius: 8px;
}
.scale-ctrl { display: flex; align-items: center; gap: 10px; background: #fff; padding: 5px 15px; border-radius: 20px; border: 1px solid #ddd; }

select, button, input { padding: 8px 12px; font-size: 1em; border-radius: 6px; border: 1px solid #888; }

#shuffleBtn { background: linear-gradient(180deg, #64b5f6, #1e88e5); color: white; border: none; font-weight: bold; }
#popoutBtn { background: linear-gradient(180deg, #9575cd, #5e35b1); color: white; border: none; font-weight: bold; }
#saveBtn { background: linear-gradient(180deg, #81c784, #388e3c); color: white; border: none; font-weight: bold; }
#pdfBtn { background: linear-gradient(180deg, #ff8a65, #e64a19); color: white; border: none; font-weight: bold; }
#resetBtn { background: linear-gradient(180deg, #ef9a9a, #d32f2f); color: white; border: none; font-weight: bold; }
button:hover { opacity: 0.8; cursor: pointer; }

.teacher { 
  text-align:center; font-weight:bold; padding:10px; 
  border:2px solid #333; background:#e1f0ff; 
  width: 300px; margin: 15px auto;
}
.row { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }

.seat { 
  width: 100px; height: 65px; background:#fff; border:1px solid #444; 
  border-radius:4px; display:flex; align-items:center; justify-content:center; 
  flex-direction:column; position: relative; font-size: 0.85em;
}
.seat.fixed { background:#d6f5ff !important; -webkit-print-color-adjust: exact; }
.seat.hidden-spacer { border:1px dashed #ccc; background:rgba(0,0,0,0.02); }

#teacherPdfArea { width: fit-content; margin: 0 auto; padding: 20px; background: white; }
#teacherPdfArea .seat {
  width: calc(var(--base-seat-w) * var(--print-scale));
  height: calc(var(--base-seat-h) * var(--print-scale));
  font-size: calc(var(--base-font) * var(--print-scale));
}
#teacherPdfArea .row { gap: calc(10px * var(--print-scale)); margin-bottom: calc(10px * var(--print-scale)); }

textarea { width: 100%; height: 100px; box-sizing: border-box; padding: 8px; resize: none; }
table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 10px; }
th, td { border:1px solid #ccc; padding:4px; text-align:center; font-size: 0.8em; }
.is-back-row { background-color: #fafafa !important; } 

#miniSeating { 
  display: flex; flex-direction: column; gap: 4px; 
  margin: 15px auto; padding: 10px; border: 1px solid #ddd; 
  border-radius: 8px; background: #fafafa; width: fit-content;
}
.miniRow { display: flex; gap: 4px; }
.miniSeat { 
  width: 32px; height: 24px; border: 1px solid #444; border-radius: 3px;
  background: #fff; cursor: pointer; font-size: 0.6em; 
  display: flex; align-items: center; justify-content: center;
}
.miniSeat.selected { background: #a5d6a7 !important; border-color: #2e7d32; }

.status-msg { text-align:center; height:1.2em; font-weight:bold; margin:5px 0; font-size:0.9em; }
</style>
</head>
<body>

<div class="side-panel">
  <div class="container">
    <h2>名前入力</h2>
    <textarea id="nameInput" placeholder="田中太郎 たなかたろう&#10;佐藤花子 さとうはなこ"></textarea>
    <button id="addNamesBtn" style="width:100%; margin-top:10px;">名簿を更新</button>
  </div>

  <div class="container">
    <h3>出席番号管理</h3>
    <table id="studentTable">
      <thead>
        <tr><th style="width:30px;">番</th><th>氏名</th><th>ふりがな</th><th style="width:35px;">前方</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <button id="addRowBtn" style="width:100%; margin-top:10px;">＋ 行を追加</button>
    <p style="font-size:0.72em; color:#666; margin-top:8px;">
      ・<b>Ctrl＋行クリック：</b>後方グループ指定。<br>
      ・「前方」チェック：最前列優先。
    </p>

    <div style="text-align:center; margin-top:15px; font-weight:bold; font-size:0.9em;">【空席設定】</div>
    <div id="miniSeating"></div>
  </div>
</div>

<div class="main-panel">
  <div class="container">
    <div class="control-panel">
      <div>
        シャッフル：<select id="shuffleCount"></select>
        <button id="shuffleBtn">席替え実行</button>
        <button id="popoutBtn">📺 別窓で表示</button>
      </div>
      
      <div class="scale-ctrl">
        <span>サイズ:</span>
        <input type="range" id="scaleSlider" min="0.5" max="1.5" step="0.05" value="1.0">
      </div>

      <button id="saveBtn">💾 保存</button>
      <button id="pdfBtn">📄 PDF</button>
      <button id="resetBtn">🗑 削除</button>
    </div>
    <div id="statusText" class="status-msg"></div>
  </div>

  <div class="container">
    <div style="text-align:center; color:#1976d2; font-weight:bold; margin-bottom:5px;">【学生用（教卓が上）】</div>
    <div class="teacher">教卓</div>
    <div id="seatingAreaStudent"></div>
  </div>

  <div class="container" style="overflow-x: auto;">
    <div id="teacherPdfArea">
      <div id="pdfTitle" contenteditable="true" style="text-align:center; font-weight:bold; margin-bottom:15px; font-size:1.5em;">令和　年度 ○年○組 座席表</div>
      <div id="seatingAreaTeacher"></div>
      <div class="teacher" style="margin-top:20px;">教卓</div>
    </div>
  </div>
</div>

<script>
const ROWS = 7;
const COLS = 7;
const STORAGE_KEY = "seating_popout_v16";
const tbody = document.querySelector("#studentTable tbody");
const areaStudent = document.getElementById("seatingAreaStudent");
const areaTeacher = document.getElementById("seatingAreaTeacher");
const statusText = document.getElementById("statusText");
const hiddenSeats = new Set();
let currentStudentOrderMap = { front:[], back:[], normal:[] };
let studentWin = null; // 別窓用オブジェクト

// --- データ管理 ---

function saveData() {
  const tableData = getCurrentStudentsFromTable();
  const data = {
    orderMap: currentStudentOrderMap,
    tableData: tableData,
    hidden: Array.from(hiddenSeats),
    scale: document.getElementById("scaleSlider").value,
    title: document.getElementById("pdfTitle").innerText
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showStatus("✅ 保存しました。", "#2e7d32");
}

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) {
    for(let i=1; i<=40; i++) createRow(i, "", "");
    renderMiniSeats(); renderAll(); return;
  }
  const data = JSON.parse(saved);
  if (data.scale) {
    document.getElementById("scaleSlider").value = data.scale;
    updateScaleUI(data.scale);
  }
  if (data.title) document.getElementById("pdfTitle").innerText = data.title;
  tbody.innerHTML = "";
  if (data.tableData) data.tableData.forEach(s => createRow(s.num, s.name, s.kana, s.checked, s.isBack));
  currentStudentOrderMap = data.orderMap || { front:[], back:[], normal:[] };
  if (data.hidden) { hiddenSeats.clear(); data.hidden.forEach(h => hiddenSeats.add(h)); }
  renderMiniSeats(); renderAll();
}

// --- 別窓表示システム ---

function openStudentWindow() {
  if (studentWin && !studentWin.closed) {
    studentWin.focus();
    return;
  }
  studentWin = window.open("", "StudentWindow", "width=900,height=800");
  const style = document.querySelector('style').innerHTML;
  studentWin.document.write(`
    <html><head><title>生徒用座席表</title><style>${style}</style></head>
    <body style="background:#fff;">
      <div style="text-align:center; padding:20px;">
        <div class="teacher">教卓</div>
        <div id="displayArea"></div>
      </div>
    </body></html>`);
  syncStudentWindow();
}

function syncStudentWindow() {
  if (studentWin && !studentWin.closed) {
    const area = studentWin.document.getElementById("displayArea");
    if (area) {
      area.innerHTML = areaStudent.innerHTML;
      // スケールを適用
      const scale = document.getElementById("scaleSlider").value;
      studentWin.document.documentElement.style.setProperty('--print-scale', scale);
    }
  }
}

// --- メインロジック ---

function createRow(num = "", name = "", kana = "", checked=false, isBack=false) {
  const tr = document.createElement("tr");
  if(isBack) tr.classList.add("is-back-row");
  tr.innerHTML = `
    <td><span contenteditable="true" style="display:block;">${num}</span></td>
    <td><span contenteditable="true" style="display:block; text-align:left;">${name}</span></td>
    <td><span contenteditable="true" style="display:block; text-align:left;">${kana}</span></td>
    <td><input type="checkbox" ${checked?"checked":""}></td>`;
  
  if(checked) tr.classList.add("checked");
  tr.querySelector("input").addEventListener("change", (e) => tr.classList.toggle("checked", e.target.checked));
  tr.addEventListener("click", (e) => {
    if (e.ctrlKey) {
      tr.classList.toggle("is-back-row");
      window.getSelection().removeAllRanges();
    }
  });
  tbody.appendChild(tr);
}

function getCurrentStudentsFromTable(){
  const arr=[];
  tbody.querySelectorAll("tr").forEach(tr=>{
    const spans = tr.querySelectorAll("span");
    const checked = tr.querySelector("input").checked;
    const isBack = tr.classList.contains("is-back-row");
    arr.push({ num: spans[0].textContent.trim(), name: spans[1].textContent.trim(), kana: spans[2].textContent.trim(), checked, isBack });
  });
  return arr;
}

const shuffleArray = (arr) => {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
};

function doShuffleProcess() {
  const tableStudents = getCurrentStudentsFromTable().filter(s => s.name !== "");
  const front = tableStudents.filter(s => s.checked);
  const back = tableStudents.filter(s => s.isBack && !s.checked);
  const normal = tableStudents.filter(s => !s.checked && !s.isBack);
  shuffleArray(front); shuffleArray(back); shuffleArray(normal);
  currentStudentOrderMap = { front, back, normal };
  renderAll();
}

function renderAll() {
  const tableStudents = getCurrentStudentsFromTable().filter(s => s.name !== "");
  if (tableStudents.length === 0) return;

  const availableSeats = [];
  for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(!hiddenSeats.has(`${r}-${c}`)) availableSeats.push({r, c});

  const seatMap = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
  const usedSeatKeys = new Set();

  // 1. 前方
  const frontSeats = [...availableSeats].sort((a,b)=> a.r - b.r || a.c - b.c);
  currentStudentOrderMap.front.forEach(st => {
    const s = frontSeats.find(seat => !usedSeatKeys.has(`${seat.r}-${seat.c}`));
    if(s){ seatMap[s.r][s.c] = st; usedSeatKeys.add(`${s.r}-${s.c}`); }
  });

  // 2. 後方ゾーン（指定者が1人でも最後列をシャッフルゾーンにする）
  const backSeatPool = [...availableSeats].sort((a,b)=> b.r - a.r || a.c - b.c);
  const backZoneSize = Math.min(availableSeats.length - usedSeatKeys.size, Math.max(COLS, currentStudentOrderMap.back.length));
  const backZoneSeats = [];
  for(let i=0; i<backSeatPool.length && backZoneSeats.length < backZoneSize; i++){
    if(!usedSeatKeys.has(`${backSeatPool[i].r}-${backSeatPool[i].c}`)) backZoneSeats.push(backSeatPool[i]);
  }
  const backZonePeople = [...currentStudentOrderMap.back];
  const normalPool = [...currentStudentOrderMap.normal];
  while(backZonePeople.length < backZoneSeats.length && normalPool.length > 0) backZonePeople.push(normalPool.pop());
  
  shuffleArray(backZonePeople);
  backZoneSeats.forEach((seat, i) => {
    if(backZonePeople[i]){ seatMap[seat.r][seat.c] = backZonePeople[i]; usedSeatKeys.add(`${seat.r}-${seat.c}`); }
  });

  // 3. 通常
  const remainingSeats = availableSeats.filter(s => !usedSeatKeys.has(`${s.r}-${s.c}`)).sort((a, b) => a.c - b.c || a.r - b.r);
  normalPool.forEach((st, i) => { if(remainingSeats[i]) seatMap[remainingSeats[i].r][remainingSeats[i].c] = st; });

  renderView(areaStudent, seatMap, false);
  renderView(areaTeacher, seatMap, true);
  syncStudentWindow(); // 別窓を更新
}

function renderView(container, seatMap, isReverse) {
  container.innerHTML = "";
  const rIdx = isReverse ? [...Array(ROWS).keys()].reverse() : [...Array(ROWS).keys()];
  const cIdx = isReverse ? [...Array(COLS).keys()].reverse() : [...Array(COLS).keys()];
  rIdx.forEach(r => {
    const rowDiv = document.createElement("div"); rowDiv.className = "row";
    cIdx.forEach(c => {
      const seatEl = document.createElement("div"); seatEl.className = "seat";
      if(hiddenSeats.has(`${r}-${c}`)) { 
        seatEl.className = "seat hidden-spacer"; seatEl.innerHTML = "<span style='color:#ccc; font-size:0.7em;'>空席</span>";
      } else {
        const s = seatMap[r][c];
        if(s) {
          seatEl.innerHTML = `<div style="font-size:0.6em; color:#666; position:absolute; top:2px; left:4px;">${s.num}</div>
                              <div style="font-weight:bold;"><ruby>${s.name}<rt>${s.kana}</rt></ruby></div>`;
          if(s.checked) seatEl.classList.add("fixed");
        }
      }
      rowDiv.appendChild(seatEl);
    });
    container.appendChild(rowDiv);
  });
}

function updateScaleUI(val) {
  document.documentElement.style.setProperty('--print-scale', val);
  syncStudentWindow();
}
document.getElementById("scaleSlider").addEventListener("input", (e) => updateScaleUI(e.target.value));

function showStatus(msg, color) {
  statusText.textContent = msg; statusText.style.color = color;
  setTimeout(() => { if(statusText.textContent === msg) statusText.textContent = ""; }, 3000);
}

function renderMiniSeats() {
  const mini = document.getElementById("miniSeating"); mini.innerHTML = "";
  for(let r=0; r<ROWS; r++){
    const rowDiv = document.createElement("div"); rowDiv.className = "miniRow";
    for(let c=0; c<COLS; c++) {
      const s = document.createElement("div"); s.className = "miniSeat";
      if(hiddenSeats.has(`${r}-${c}`)) s.classList.add("selected");
      s.addEventListener("click", () => {
        if(hiddenSeats.has(`${r}-${c}`)) hiddenSeats.delete(`${r}-${c}`); else hiddenSeats.add(`${r}-${c}`);
        renderMiniSeats(); renderAll();
      });
      rowDiv.appendChild(s);
    }
    mini.appendChild(rowDiv);
  }
}

// --- イベント ---
document.getElementById("popoutBtn").addEventListener("click", openStudentWindow);
document.getElementById("addNamesBtn").addEventListener("click", () => {
  const lines = document.getElementById("nameInput").value.split("\n").filter(l=>l.trim()!=="");
  tbody.innerHTML = "";
  lines.forEach((line, i) => {
    const parts = line.trim().split(/[\s　]+/);
    createRow(i+1, parts[0] || "", parts[1] || "");
  });
  doShuffleProcess();
});

document.getElementById("shuffleBtn").addEventListener("click", () => {
  const times = parseInt(document.getElementById("shuffleCount").value);
  let count = 0;
  const timer = setInterval(() => {
    doShuffleProcess(); count++;
    statusText.textContent = `シャッフル中... (${count}/${times})`;
    if(count >= times) { clearInterval(timer); showStatus("✨ 完了", "#e64a19"); }
  }, 80);
});

document.getElementById("pdfBtn").addEventListener("click", () => {
  const element = document.getElementById("teacherPdfArea");
  html2pdf().set({ margin:5, filename:'座席表.pdf', jsPDF:{unit:'mm', format:'a4', orientation:'landscape'} }).from(element).save();
});

document.getElementById("saveBtn").addEventListener("click", saveData);
document.getElementById("resetBtn").addEventListener("click", () => { if(confirm("消去？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } });
document.getElementById("addRowBtn").addEventListener("click", () => createRow(tbody.rows.length+1, "", ""));

window.addEventListener("DOMContentLoaded", () => {
  const sel = document.getElementById("shuffleCount");
  for(let i=1; i<=50; i++) {
    const opt = document.createElement("option"); opt.value = i; opt.textContent = i + "回";
    if(i===10) opt.selected = true; sel.appendChild(opt);
  }
  loadData();
});
</script>
</body>
</html>
