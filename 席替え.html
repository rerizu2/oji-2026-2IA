<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7×7グリッド 席替えツール（状態維持版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body {
  font-family: "Yu Gothic", "Segoe UI", sans-serif;
  background: #f0f3f9;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 30px;
  padding: 30px;
  flex-wrap: wrap;
}
#viewSourceBtn {
  position: fixed; top: 15px; right: 15px;
  padding: 8px 14px; font-size: 0.9em;
  background: #333; color: #fff; border: none;
  border-radius: 6px; cursor: pointer;
  z-index: 100;
}
#viewSourceBtn:hover { background: #555; }

#sourceOverlay {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); color: #fff; z-index: 1000;
  padding: 40px; box-sizing: border-box;
}
#sourceBox {
  width: 100%; height: 90%; background: #1e1e1e; color: #d4d4d4;
  font-family: 'Consolas', 'Monaco', monospace; 
  padding: 15px; overflow: auto; white-space: pre;
  border: 1px solid #444; border-radius: 8px; font-size: 13px; line-height: 1.5;
}
.modal-close {
  position: absolute; top: 10px; right: 50px;
  background: #ff5252; color: white; border: none;
  padding: 8px 15px; border-radius: 4px; cursor: pointer;
}

.container {
  background: #fff; border-radius: 10px; padding: 20px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1); margin-bottom: 20px;
}
.control-panel {
  display: flex; justify-content: center; align-items: center;
  gap: 10px; margin-bottom: 15px; flex-wrap: wrap;
}
select, button, input {
  padding: 6px 10px; font-size: 1em; border-radius: 6px; border: 1px solid #888;
}
button {
  background: linear-gradient(180deg, #e0e0e0, #bdbdbd);
  cursor: pointer;
}
button:hover { background: linear-gradient(180deg, #f0f0f0, #d0d0d0); }

#pdfBtn { background: linear-gradient(180deg, #ff8a65, #e64a19); color: white; border: none; }
#pdfBtn:hover { background: linear-gradient(180deg, #ffab91, #f4511e); }

textarea {
  width: 200px; height: 200px; font-size: 14px;
  padding: 8px; border-radius: 6px; border: 1px solid #bbb; resize: none;
}
.teacher { 
  text-align:center; font-weight:bold; padding:8px; 
  border:2px solid #333; background:#e1f0ff; 
  width: 250px; margin: 10px auto;
}
.row { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
.seat { 
  width: 90px; height: 55px; background:#fff; border:1px solid #555; 
  border-radius:4px; display:flex; align-items:center; justify-content:center; 
  flex-direction:column; font-size: 0.85em;
}
.seat.fixed { background:#d6f5ff !important; -webkit-print-color-adjust: exact; }
.seat.hidden-spacer { border:1px dashed #ccc; background:rgba(0,0,0,0.02); }
.seat input { width: 85%; border:none; text-align:center; font-size:1.1em; background: transparent; pointer-events: none;}

table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; }
th { background:#e1f0ff; }
tr.checked { background:#d7f8d7; }

#miniSeating { margin-top: 15px; display:flex; flex-direction:column; gap:5px; }
.miniRow { display:flex; justify-content:center; gap:5px; }
.miniSeat { 
  width:32px; height:22px; border:1px solid #444; border-radius:4px; 
  background:#fafafa; cursor:pointer; font-size:0.7em; 
  display:flex; justify-content:center; align-items:center;
}
.miniSeat.selected { background:#a5d6a7 !important; }

h2, h3 { margin-top: 0; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 5px;}
.view-label { text-align: center; font-weight: bold; color: #1976d2; margin-bottom: 10px; }
</style>
</head>
<body>

<button id="viewSourceBtn">ソース表示</button>

<div id="sourceOverlay">
  <button class="modal-close" id="closeSourceBtn">閉じる</button>
  <div id="sourceBox"></div>
</div>

<div class="container" style="width:280px;">
  <h2>名前入力</h2>
  <textarea id="nameInput" placeholder="名前を改行して入力"></textarea>
  <button id="addNamesBtn" style="width:100%; margin-top:10px;">名簿を更新</button>
  <div id="miniSeating"></div>
  <p style="font-size:0.8em; color:#666; text-align:center; margin-top:10px;">
    【ミニ座席】<br>緑のマスは「空白」になり、<br>座席は詰められません。
  </p>
</div>

<div style="flex:1; min-width:720px;">
  <div class="container">
    <div class="control-panel">
      <label>シャッフル：</label>
      <select id="shuffleCount"></select>
      <button id="shuffleBtn">席替え実行</button>
      <button id="saveBtn">💾 保存</button>
      <button id="pdfBtn">📄 下の表をPDF出力</button>
      <button id="resetBtn">🗑 削除</button>
    </div>
    <p id="statusText" style="text-align:center; height:1.2em; color:#d32f2f; font-weight:bold;"></p>
  </div>

  <div class="container">
    <div class="view-label">【学生用表示】（教卓が上）</div>
    <div class="teacher">教卓</div>
    <div id="seatingAreaStudent"></div>
  </div>

  <div class="container" id="teacherPdfArea">
    <div style="padding: 20px; background: white;">
      <div class="view-label">【教職員用表示】（教卓が下・上下左右反転）</div>
      <div id="seatingAreaTeacher"></div>
      <div class="teacher">教卓</div>
    </div>
  </div>
</div>

<div class="container" style="width:280px;">
  <h3>出席番号管理</h3>
  <table id="studentTable">
    <thead>
      <tr><th>番・氏名</th><th>固定</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <button id="addRowBtn" style="width:100%; margin-top:10px;">＋ 行を追加</button>
</div>

<script>
const ROWS = 7;
const COLS = 7;
const tbody = document.querySelector("#studentTable tbody");
const areaStudent = document.getElementById("seatingAreaStudent");
const areaTeacher = document.getElementById("seatingAreaTeacher");
const hiddenSeats = new Set();

// 現在の並び順を保持する配列
let currentStudentOrder = [];

/* ===== ソース表示機能 ===== */
const viewBtn = document.getElementById("viewSourceBtn");
const closeBtn = document.getElementById("closeSourceBtn");
const overlay = document.getElementById("sourceOverlay");
const sourceBox = document.getElementById("sourceBox");

viewBtn.addEventListener("click", () => {
  let html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  sourceBox.innerHTML = html;
  overlay.style.display = "block";
});
closeBtn.addEventListener("click", () => { overlay.style.display = "none"; });

/* ===== 席替えロジック ===== */
function createRow(num = "", name = "", checked=false) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td style="display:flex; gap:5px;">
      <span contenteditable="true" style="width:35px; border-right:1px solid #eee;">${num}</span>
      <span contenteditable="true" style="flex:1; text-align:left;">${name}</span>
    </td>
    <td><input type="checkbox" ${checked?"checked":""}></td>`;
  
  const checkInput = tr.querySelector("input");
  checkInput.addEventListener("change", ()=>{
    tr.classList.toggle("checked", checkInput.checked);
    syncOrderFromTable(); // チェック状態を最新の並び順に反映
    renderAll();
  });
  if(checked) tr.classList.add("checked");
  tbody.appendChild(tr);
}

// テーブル（右側）の情報に基づいて、現在の並び順配列の状態（名前・固定）を同期する
function syncOrderFromTable() {
  const tableData = getCurrentStudentsFromTable();
  currentStudentOrder.forEach(s => {
    const match = tableData.find(t => t.num === s.num);
    if(match) {
      s.name = match.name;
      s.checked = match.checked;
    }
  });
}

function getCurrentStudentsFromTable(){
  const arr=[];
  tbody.querySelectorAll("tr").forEach(tr=>{
    const spans = tr.querySelectorAll("span");
    const num = spans[0].textContent.trim();
    const name = spans[1].textContent.trim();
    const checked = tr.querySelector("input").checked;
    if(num || name) arr.push({num, name, checked});
  });
  return arr;
}

function renderMiniSeats() {
  const mini = document.getElementById("miniSeating");
  mini.innerHTML = "";
  for(let r=0; r<ROWS; r++){
    const rowDiv = document.createElement("div"); rowDiv.className = "miniRow";
    for(let c=0; c<COLS; c++) {
      const s = document.createElement("div"); s.className = "miniSeat";
      const key = `${r}-${c}`;
      if(hiddenSeats.has(key)) s.classList.add("selected");
      s.addEventListener("click", () => {
        if(hiddenSeats.has(key)) hiddenSeats.delete(key);
        else hiddenSeats.add(key);
        renderMiniSeats(); renderAll();
      });
      rowDiv.appendChild(s);
    }
    mini.appendChild(rowDiv);
  }
}

// 席替え実行ボタンが押された時だけ呼ばれる
function doShuffleProcess() {
  const allStudents = getCurrentStudentsFromTable().filter(s => s.name !== "");
  const fixedOnes = allStudents.filter(s => s.checked);
  const flexOnes = allStudents.filter(s => !s.checked);
  
  // シャッフル
  for(let i=flexOnes.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [flexOnes[i], flexOnes[j]] = [flexOnes[j], flexOnes[i]];
  }
  
  currentStudentOrder = [...fixedOnes, ...flexOnes];
  renderAll();
}

function renderAll() {
  // 並び順がない（初期状態）場合はテーブルから読み込む
  if(currentStudentOrder.length === 0) {
    currentStudentOrder = getCurrentStudentsFromTable().filter(s => s.name !== "");
  }

  const seatMap = [];
  for(let r=0; r<ROWS; r++) seatMap[r] = new Array(COLS).fill(null);
  
  let sIdx = 0;
  for(let r=0; r<ROWS; r++) {
    for(let c=0; c<COLS; c++) {
      if(!hiddenSeats.has(`${r}-${c}`) && sIdx < currentStudentOrder.length) {
        seatMap[r][c] = currentStudentOrder[sIdx];
        sIdx++;
      }
    }
  }
  renderView(areaStudent, seatMap, false);
  renderView(areaTeacher, seatMap, true);
}

function renderView(container, seatMap, isReverse) {
  container.innerHTML = "";
  const rIndices = isReverse ? [...Array(ROWS).keys()].reverse() : [...Array(ROWS).keys()];
  const cIndices = isReverse ? [...Array(COLS).keys()].reverse() : [...Array(COLS).keys()];

  rIndices.forEach(r => {
    const rowDiv = document.createElement("div"); rowDiv.className = "row";
    cIndices.forEach(c => {
      const seatEl = document.createElement("div"); seatEl.className = "seat";
      if(hiddenSeats.has(`${r}-${c}`)) {
        seatEl.classList.add("hidden-spacer");
      } else {
        const s = seatMap[r][c];
        if(s) {
          seatEl.innerHTML = `<div>${s.num}</div><div style="font-weight:bold">${s.name}</div>`;
          if(s.checked) seatEl.classList.add("fixed");
        }
      }
      rowDiv.appendChild(seatEl);
    });
    container.appendChild(rowDiv);
  });
}

document.getElementById("addNamesBtn").addEventListener("click", () => {
  const names = document.getElementById("nameInput").value.split("\n").filter(n=>n.trim()!=="");
  tbody.innerHTML = "";
  names.forEach((n, i) => createRow(i+1, n));
  currentStudentOrder = getCurrentStudentsFromTable().filter(s => s.name !== "");
  renderAll();
});

document.getElementById("shuffleBtn").addEventListener("click", () => {
  const times = parseInt(document.getElementById("shuffleCount").value);
  let count = 0; const status = document.getElementById("statusText");
  const timer = setInterval(() => {
    doShuffleProcess();
    count++;
    status.textContent = `席替え中... (${count}/${times})`;
    if(count >= times) { 
      clearInterval(timer); 
      status.textContent = "席替え完了！"; 
      setTimeout(()=> status.textContent="", 2000); 
    }
  }, 100);
});

document.getElementById("pdfBtn").addEventListener("click", () => {
  const element = document.getElementById("teacherPdfArea");
  const opt = { margin: 10, filename: '座席表.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } };
  html2pdf().set(opt).from(element).save();
});

document.getElementById("saveBtn").addEventListener("click", () => {
  syncOrderFromTable();
  const data = { 
    students: currentStudentOrder, 
    tableData: getCurrentStudentsFromTable(),
    hidden: Array.from(hiddenSeats) 
  };
  localStorage.setItem("seatingData_v2", JSON.stringify(data));
  alert("保存しました");
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if(confirm("初期化しますか？")) { localStorage.removeItem("seatingData_v2"); location.reload(); }
});

document.getElementById("addRowBtn").addEventListener("click", () => createRow(tbody.rows.length+1, ""));

window.addEventListener("DOMContentLoaded", () => {
  const sel = document.getElementById("shuffleCount");
  for(let i=1; i<=50; i++) {
    const opt = document.createElement("option"); opt.value = i; opt.textContent = i + "回";
    if(i===10) opt.selected = true; sel.appendChild(opt);
  }
  const saved = localStorage.getItem("seatingData_v2");
  if(saved) {
    const data = JSON.parse(saved);
    data.tableData.forEach(s => createRow(s.num, s.name, s.checked));
    currentStudentOrder = data.students;
    if(data.hidden) data.hidden.forEach(h => hiddenSeats.add(h));
  } else { 
    for(let i=1; i<=40; i++) createRow(i, ""); 
  }
  renderMiniSeats(); 
  renderAll();
});
</script>
</body>
</html>
