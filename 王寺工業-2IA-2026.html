    .switch-area { display: flex; align-items: center; gap: 8px; }
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.3); transition: .4s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--secondary); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* ナビゲーション */
    nav ul { display: flex; list-style: none; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }

</head>

    function applyFilters() {
      const vNo = document.getElementById('s-no').value.trim();
      const vComp = document.getElementById('s-comp').value.toLowerCase();
      const vJob = document.getElementById('s-job').value.toLowerCase();
      const vDate = document.getElementById('s-date').value.toLowerCase();
      const vLoc = document.getElementById('s-loc').value.toLowerCase();
      const tbody = document.getElementById('job-body');
      if (!tbody) return;
      tbody.innerHTML = "";
      jobData.forEach(row => {
        if ((vNo === "" || row[0].toString() === vNo) && row[1].toLowerCase().includes(vComp) && row[2].toLowerCase().includes(vJob) && row[3].toLowerCase().includes(vDate) && row[4].toLowerCase().includes(vLoc)) {
          const badge = row[4].includes("県内") ? "badge-kenai" : "badge-kengai";
          tbody.innerHTML += `<tr><td>${row[0]}</td><td style="font-weight:bold;">${row[1]}</td><td>${row[2]}</td><td class="date-text">${row[3].replace("2026/","")}</td><td><span class="${badge}">${row[4]}</span></td></tr>`;
        }
      });
    }

    function resetFilters() {
      ['s-no', 's-comp', 's-job', 's-date', 's-loc'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ""; });
      applyFilters();
    }

    const heroImages = ["https://rerizu2.github.io/oji-2025-1AI/文化祭.png", "https://rerizu2.github.io/oji-2025-1AI/体育大会.png", "https://rerizu2.github.io/oji-2025-1AI/校外学習.png", "https://rerizu2.github.io/oji-2025-1AI/球技大会.png"];
    let heroIdx = 0;
    function updateHero() {
      const img = document.getElementById("hero-img");
      if(!img) return;
      img.style.opacity = 0;
      setTimeout(() => { img.src = heroImages[heroIdx]; img.onload = () => { img.style.opacity = 1; }; }, 300);
    }
    function nextHero() { heroIdx = (heroIdx + 1) % heroImages.length; updateHero(); }
    function prevHero() { heroIdx = (heroIdx - 1 + heroImages.length) % heroImages.length; updateHero(); }
    setInterval(nextHero, 5000);

    function toggleMenu() { document.getElementById("nav-list").classList.toggle("show"); }
    function toggleDesign() { document.body.classList.toggle('theme-1ia', document.getElementById('design-toggle').checked); applyTranslations(); showPage(currentPage); }
    function changeLanguage() { currentLang = document.getElementById('lang-select').value; applyTranslations(); showPage(currentPage); }

    function applyTranslations() {
      const t = translations[currentLang] || translations.ja;
      const is1IA = document.body.classList.contains('theme-1ia');
      document.getElementById('login-msg').innerText = t.loginMsg;
      document.getElementById('login-btn').innerText = t.loginBtn;
      document.getElementById('qr-toggle-btn').innerText = t.qrBtn;
      document.getElementById('theme-label').innerText = t.themeLabel;
      document.getElementById('login-title').innerText = t.loginTitle;
    }

    async function toggleQRReader() {
      const container = document.getElementById("qr-reader-container");
      if (isScanning) { if(videoStream) videoStream.getTracks().forEach(t => t.stop()); isScanning = false; container.style.display = "none"; }
      else {
        try {
          videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
          document.getElementById("qr-video").srcObject = videoStream;
          document.getElementById("qr-video").play();
          container.style.display = "block"; isScanning = true;
          requestAnimationFrame(tick);
        } catch (err) { alert("Camera error."); }
      }
    }

    function tick() {
      if (!isScanning) return;
      const video = document.getElementById("qr-video");
      const canvas = document.getElementById("qr-canvas");
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        const ctx = canvas.getContext("2d"); ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code && code.data.trim().split('').map(c => (c.charCodeAt(0) * 3).toString(16)).join('') === targetHash) {
          document.getElementById("password-input").value = "V9hug";
          checkPassword();
        }
      }
      requestAnimationFrame(tick);
    }

    window.onload = function() {
      applyTranslations();
      showPage('home');
    }
  </script>
