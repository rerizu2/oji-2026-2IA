    function parseMarkdown(text) { 
      const regex = /\[(.*?)\]\((.*?)\)/; 
      const match = text.match(regex); 
      return match ? { name: match[1], url: match[2] } : { name: text, url: "" }; 
    }

    function changeLanguage() { 
      currentLang = document.getElementById('lang-select').value; 
      localStorage.setItem('oji-lang-pref', currentLang); 
      applyTranslations(); 
      showPage(currentPage); 
    }

    function applyTranslations() {
      const t = translations[currentLang], is1IA = document.body.classList.contains('theme-1ia'), navLinks = ["home", "kyujin", "schedule", "calendar", "ibento", "kakari", "gakusyuu", "test", "haihubutu"];
      const navList = document.getElementById('nav-list');
      navList.innerHTML = t.nav.map((name, i) => `<li><a onclick="showPage('${navLinks[i]}')">${name}</a></li>`).join('');
      document.getElementById('theme-label').innerText = is1IA ? t.themeLabel1IA : t.themeLabel2IA;
      document.getElementById('header-logo').innerText = is1IA ? t.headerLogo1IA : t.headerLogo;
      document.getElementById('hero-title').innerText = is1IA ? t.heroTitle1IA : t.heroTitle;
      document.getElementById('hero-sub').innerText = is1IA ? t.heroSub1IA : t.heroSub;
      document.getElementById('orient-h2').innerText = t.orientH2; 
      document.getElementById('orient-p').innerText = t.orientP;
      document.getElementById('login-title').innerText = is1IA ? t.loginTitle1IA : t.loginTitle;
      document.getElementById('login-msg').innerText = t.loginMsg; 
      document.getElementById('login-btn').innerText = t.loginBtn; 
      document.getElementById('qr-toggle-btn').innerText = t.qrBtn;
    }

    function toggleDesign() { 
      const isChecked = document.getElementById('design-toggle').checked; 
      isChecked ? document.body.classList.add('theme-1ia') : document.body.classList.remove('theme-1ia');
      if(document.getElementById('login-emoji')) document.getElementById('login-emoji').style.display=isChecked?"none":"block"; 
      localStorage.setItem('oji-theme-pref', isChecked?'1ia':'2ia'); 
      applyTranslations(); 
      showPage(currentPage); 
    }

    function checkPassword() { 
      if (document.getElementById("password-input").value.trim().split('').map(c => (c.charCodeAt(0) * 3).toString(16)).join('') === targetHash) { 
        document.getElementById("password-screen").style.display = "none"; 
        document.getElementById("main-content").style.display = "block"; 
        showPage('home'); 
      } else { alert(translations[currentLang].alertPass); } 
    }

    function showPage(page) {
      currentPage = page; const content = document.getElementById("page-content"), t = translations[currentLang]; let html = "";
      document.getElementById("nav-list").classList.remove("show");

      if (page === 'home') {
        let newsHtml = `<ul class="news-list">` + t.newsList.map(item => `<li><span class="news-date">${item.date}</span><span>${item.text}</span>` + (item.url?`<a href="${item.url}" target="_blank" class="news-link">【${t.detailsText}】</a>`:"") + `</li>`).join("") + `</ul>`;
        html = `<div class="card"><h2>${t.newsTitle}</h2>${newsHtml}</div><div class="card"><h2>${t.aboutTitle}</h2><p style="text-align:center;">${t.aboutP}</p></div><div class="card"><h2>${t.qrTitle}</h2><img src="2IAホームページ-QRコード.png" style="width:200px; display:block; margin:0 auto; border-radius:15px;"></div>`;
      } 
      else if (page === 'kyujin') {
        html = `<h1>${t.nav[1]}</h1>
                <div class="search-panel">
                  <div class="search-group"><label>${t.search[0]}</label><input type="text" id="s-no" oninput="applyFilters()"></div>
                  <div class="search-group"><label>${t.search[1]}</label><input type="text" id="s-comp" oninput="applyFilters()"></div>
                  <div class="search-group"><label>${t.search[2]}</label><input type="text" id="s-job" oninput="applyFilters()"></div>
                  <div class="search-group"><label>${t.search[3]}</label><select id="s-loc" onchange="applyFilters()"><option value="">${t.allLoc}</option><option value="県内">${t.badgeIn}</option><option value="県外">${t.badgeOut}</option></select></div>
                  <div class="search-group"><label>${t.search[4]}</label><input type="date" id="s-date" onchange="applyFilters()"></div>
                  <button class="btn-reset" onclick="resetFilters()">${t.search[5]}</button>
                </div>
                <div class="table-container">
                  <table class="job-table">
                    <thead><tr><th>${t.th[0]}</th><th>${t.th[1]}</th><th>${t.th[2]}</th><th>${t.th[3]}</th><th>${t.th[4]}</th><th>${t.th[5]}</th></tr></thead>
                    <tbody id="job-body"></tbody>
                  </table>
                </div>`;
        setTimeout(applyFilters, 50);
      } 
      else if (page === 'schedule') { html = `<h1>${t.nav[2]}</h1><div class="card"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQv5WpolITwLMOUMj4pWlA5J9coAKDJLkcr_DCmpTvOqsYyNOTnFRbOKnXM73czN4MpaDaUT7xVIelM/pubhtml?gid=0&amp;single=true&amp;widget=true&amp;headers=false" height="400"></iframe></div>`; }
      else if (page === 'calendar') { html = `<h1>${t.nav[3]}</h1><div class="card"><iframe src="https://calendar.google.com/calendar/embed?src=oji.information.1ia%40gmail.com&ctz=Asia%2FTokyo" height="500"></iframe><br><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQv5WpolITwLMOUMj4pWlA5J9coAKDJLkcr_DCmpTvOqsYyNOTnFRbOKnXM73czN4MpaDaUT7xVIelM/pubhtml?gid=1502073658&amp;single=true&amp;widget=true&amp;headers=false" height="800"></iframe></div>`; }
      else if (page === 'ibento') { html = `<h1>${t.nav[4]}</h1><div class="card"><p style="text-align:center;">${t.emptyEvent}</p></div>`; }
      else if (page === 'kakari') { html = `<h1>${t.nav[5]}</h1><div class="card"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vR_C8R7ezRBsUXx1Z6JdiXx08e5xA27VRYHB3w-G6lpUsmL1ymS8GtG7PKfB705dqZitdbCiRZVQlZz/pubhtml?widget=true&amp;headers=false" height="800"></iframe></div>`; }
      else if (page === 'gakusyuu') { html = `<h1>${t.nav[6]}</h1><div class="card"><h2>Seat Shuffle</h2><iframe src="https://rerizu2.github.io/oji-2026-2IA/%E5%B8%AD%E6%9B%BF%E3%81%88.html" style="height: 600px"></iframe></div><div class="card"><h2>AI Chat</h2><iframe src="https://udify.app/chatbot/92D920kUwjWcHbHb" style="height: 600px"></iframe></div>`; }
      else if (page === 'test') { html = `<h1>${t.nav[7]}</h1><div class="card"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRE3WB1xgKs3cxvjvuwiTDk5uPFO2bMzNCiQQbMaOfI5m9hWmkxZVn8qmideHJYVr8-_iGbB2KxgAzv/pubhtml?gid=2109316949&amp;single=true&amp;widget=true&amp;headers=false" height="600"></iframe></div>`; }
      else if (page === 'haihubutu') { html = `<h1>${t.nav[8]}</h1><div class="card"><iframe src="https://drive.google.com/embeddedfolderview?id=1uDqKuYJx3aQ4avxmkW9A7JTlDQXMYhNB#grid" height="450"></iframe></div>`; }
      content.innerHTML = html; window.scrollTo(0,0);
    }

    function applyFilters() {
      const vNo = document.getElementById('s-no')?.value.trim() || "";
      const vComp = document.getElementById('s-comp')?.value.toLowerCase() || "";
      const vJob = document.getElementById('s-job')?.value.toLowerCase() || "";
      const vLoc = document.getElementById('s-loc')?.value || "";
      const vDateRaw = document.getElementById('s-date')?.value || "";
      const vDate = vDateRaw.replace(/-/g, '/');
      const tbody = document.getElementById('job-body');
      const t = translations[currentLang];
      if (!tbody) return; 
      tbody.innerHTML = "";
      jobList.forEach(row => { 
        const info = parseMarkdown(row[1]); 
        if ((vNo === "" || row[0].toString() === vNo) && 
            info.name.toLowerCase().includes(vComp) && 
            row[2].toLowerCase().includes(vJob) && 
            (vLoc === "" || row[4].includes(vLoc)) && 
            (vDate === "" || row[3].includes(vDate))) { 
          const badge = row[4].includes("県内") ? "badge-kenai" : "badge-kengai"; 
          const btn = info.url ? `<a href="${info.url}" target="_blank" class="btn-job-detail">${t.btnKyujin}</a>` : ""; 
          tbody.innerHTML += `<tr><td>${row[0]}</td><td style="font-weight:bold;">${info.name}</td><td>${row[2]}</td><td>${row[3]}</td><td>${btn}</td><td><span class="${badge}">${row[4].includes("県内") ? t.badgeIn : t.badgeOut}</span></td></tr>`; 
        } 
      });
    }

    function resetFilters() { 
      ['s-no', 's-comp', 's-job', 's-loc', 's-date'].forEach(id => { 
        const el = document.getElementById(id); 
        if(el) { id==='s-loc' ? el.selectedIndex=0 : el.value = ""; } 
      }); 
      applyFilters(); 
    }
    function toggleMenu() { document.getElementById("nav-list").classList.toggle("show"); }
    const heroImages = ["https://rerizu2.github.io/oji-2025-1AI/文化祭.png", "https://rerizu2.github.io/oji-2025-1AI/体育大会.png", "https://rerizu2.github.io/oji-2025-1AI/校外学習.png", "https://rerizu2.github.io/oji-2025-1AI/球技大会.png"];
    let heroIdx = 0; 
    function showHeroImage(idx) { const img = document.querySelector(".hero-img"); if(!img) return; img.style.opacity = 0; setTimeout(() => { img.src = heroImages[idx]; img.onload = () => img.style.opacity = 1; }, 300); }
    function nextHero() { heroIdx = (heroIdx + 1) % heroImages.length; showHeroImage(heroIdx); }
    function prevHero() { heroIdx = (heroIdx - 1 + heroImages.length) % heroImages.length; showHeroImage(heroIdx); }
    setInterval(nextHero, 5000);

    async function toggleQRReader() { 
      const container = document.getElementById("qr-reader-container"); 
      if (isScanning) { 
        if(videoStream) videoStream.getTracks().forEach(t => t.stop()); 
        isScanning = false; container.style.display = "none"; 
      } else { 
        try { 
          videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); 
          document.getElementById("qr-video").srcObject = videoStream; 
          document.getElementById("qr-video").play(); container.style.display = "block"; isScanning = true; 
          requestAnimationFrame(tick); 
        } catch (err) { alert("Camera error"); } 
      } 
    }
    function tick() { 
      if (!isScanning) return; 
      const video = document.getElementById("qr-video"), canvas = document.getElementById("qr-canvas"); 
      if (video.readyState === video.HAVE_ENOUGH_DATA) { 
        canvas.height = video.videoHeight; canvas.width = video.videoWidth; 
        const ctx = canvas.getContext("2d"); ctx.drawImage(video, 0, 0, canvas.width, canvas.height); 
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height); 
        if (code && code.data.trim().split('').map(c => (c.charCodeAt(0) * 3).toString(16)).join('') === targetHash) { 
          document.getElementById("password-input").value = "V9hug"; checkPassword(); 
        } 
      } requestAnimationFrame(tick); 
    }

    window.onload = function() { 
      const savedTheme = localStorage.getItem('oji-theme-pref'); 
      const savedLang = localStorage.getItem('oji-lang-pref'); 
      if (savedLang) { currentLang = savedLang; document.getElementById('lang-select').value = currentLang; } 
      const is1IA = (savedTheme === '1ia'); 
      document.getElementById('design-toggle').checked = is1IA; 
      if (is1IA) { document.body.classList.add('theme-1ia'); if(document.getElementById('login-emoji')) document.getElementById('login-emoji').style.display="none"; }
      applyTranslations(); 
    };
