<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カメラ → Google Drive</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:sans-serif;
      background:#f0f2f5;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:500px;
      background:white;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    video,
    canvas,
    img{
      width:100%;
      border-radius:15px;
      background:black;
    }

    canvas{
      display:none;
    }

    img{
      display:none;
      margin-top:15px;
    }

    .buttons{
      display:flex;
      gap:10px;
      margin-top:15px;
    }

    button{
      flex:1;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#4285f4;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#1a73e8;
    }

    button:disabled{
      background:#999;
      cursor:not-allowed;
    }

    .status{
      margin-top:20px;
      text-align:center;
      color:#333;
      word-break:break-all;
    }

    .link{
      display:inline-block;
      margin-top:10px;
      color:#1a73e8;
      text-decoration:none;
    }

  </style>
</head>
<body>

  <div class="card">

    <h1>📸 カメラアップロード</h1>

    <video id="video" autoplay playsinline></video>

    <canvas id="canvas"></canvas>

    <img id="preview">

    <div class="buttons">

      <button id="startBtn">
        カメラ開始
      </button>

      <button id="captureBtn" disabled>
        撮影
      </button>

    </div>

    <div class="buttons">

      <button id="uploadBtn" disabled>
        Google Driveへ保存
      </button>

    </div>

    <div class="status" id="status"></div>

  </div>

  <script>

    // ====================================
    // Apps Script URL
    // ====================================

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyyhsPFnyl-wwAG78RvhRnITXvH2Nue7KCaNXcgOK5tpqzM54daP7aOk0vHfu6dhFoeg/exec";

    // ====================================
    // 要素
    // ====================================

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const preview = document.getElementById("preview");

    const startBtn = document.getElementById("startBtn");
    const captureBtn = document.getElementById("captureBtn");
    const uploadBtn = document.getElementById("uploadBtn");

    const status = document.getElementById("status");

    let imageData = null;

    // ====================================
    // カメラ開始
    // ====================================

    startBtn.addEventListener("click", async () => {

      try{

        const stream = await navigator.mediaDevices.getUserMedia({

          video:{
            facingMode:"environment"
          },
          audio:false

        });

        video.srcObject = stream;

        captureBtn.disabled = false;

        status.innerHTML = "✅ カメラ起動";

      }catch(error){

        status.innerHTML = `
          ❌ カメラ使用不可<br>
          ${error}
        `;

      }

    });

    // ====================================
    // 撮影
    // ====================================

    captureBtn.addEventListener("click", () => {

      const context = canvas.getContext("2d");

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      context.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
      );

      imageData = canvas.toDataURL("image/jpeg", 0.9);

      preview.src = imageData;
      preview.style.display = "block";

      uploadBtn.disabled = false;

      status.innerHTML = "📷 撮影完了";

    });

    // ====================================
    // Google Driveへ保存
    // ====================================

    uploadBtn.addEventListener("click", async () => {

      if(!imageData) return;

      status.innerHTML = "⬆ アップロード中...";

      uploadBtn.disabled = true;

      try{

        const base64 = imageData.split(",")[1];

        const data = {

          name: "camera_" + Date.now() + ".jpg",
          type: "image/jpeg",
          file: base64

        };

        const response = await fetch(SCRIPT_URL, {

          method:"POST",
          body:JSON.stringify(data)

        });

        const result = await response.json();

        if(result.success){

          status.innerHTML = `

            ✅ 保存成功<br>

            <a class="link"
               href="${result.url}"
               target="_blank">

              Google Driveで開く

            </a>

          `;

        }else{

          status.innerHTML = `
            ❌ エラー<br>
            ${result.error}
          `;

        }

      }catch(error){

        status.innerHTML = `
          ❌ 通信エラー<br>
          ${error}
        `;

      }

      uploadBtn.disabled = false;

    });

  </script>

</body>
</html>
