<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drive Camera</title>
<style>
/* 既存のスタイルはそのまま */
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ width:100%; height:100%; overflow:hidden; background:black; font-family:sans-serif; }
#video{ position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover; z-index:1; background:black; }
.top-bar{ position:fixed; top:0; left:0; width:100%; z-index:20; display:flex; justify-content:space-between; align-items:center; padding: calc(env(safe-area-inset-top) + 15px) 20px 0; }
#clock, #timer{ color:white; font-size:16px; font-weight:bold; text-shadow:0 0 10px black; }
#timer{ background:red; padding:6px 14px; border-radius:999px; display:none; }
.icon-btn{ width:50px; height:50px; border:none; border-radius:50%; background:rgba(255,255,255,0.15); color:white; font-size:24px; backdrop-filter:blur(10px); }
#status{ position:fixed; top:120px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:12px 20px; border-radius:20px; z-index:999; display:none; }
.zoom-wrap{ position:fixed; bottom:180px; width:100%; z-index:20; display:flex; flex-direction:column; align-items:center; gap:10px; }
#zoomText{ background:rgba(0,0,0,0.5); color:#ffdb00; padding:6px 16px; border-radius:999px; font-weight:bold; }
#zoomSlider{ width:70%; max-width:300px; }
.bottom{ position:fixed; bottom:0; left:0; width:100%; z-index:20; display:flex; flex-direction:column; align-items:center; gap:20px; padding-bottom: calc(env(safe-area-inset-bottom) + 20px); background: linear-gradient(transparent, rgba(0,0,0,0.7)); }
.mode{ display:flex; gap:40px; }
.mode button{ background:none; border:none; color:rgba(255,255,255,0.5); font-size:16px; font-weight:bold; }
.mode button.active{ color:#ffdb00; }
.bottom-row{ width:100%; display:flex; justify-content:center; align-items:center; position:relative; }
#galleryPreview{ position:absolute; right:30px; width:60px; height:60px; border-radius:15px; overflow:hidden; background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.3); display:flex; justify-content:center; align-items:center; }
#lastMedia{ width:100%; height:100%; object-fit:cover; }
#shutter{ width:85px; height:85px; border-radius:50%; border:6px solid white; background:white; margin-bottom:20px; cursor:pointer; position:relative; }
#shutter.video::after{ content:""; position:absolute; width:48px; height:48px; background:red; border-radius:50%; top:12px; left:12px; }
#shutter.recording::after{ width:28px; height:28px; border-radius:8px; top:22px; left:22px; }
#galleryModal{ position:fixed; inset:0; background:black; z-index:99999; display:none; flex-direction:column; }
#galleryHeader{ height:70px; display:flex; justify-content:space-between; align-items:center; padding: 20px; color:white; font-weight:bold; }
#galleryGrid{ flex:1; overflow-y:auto; display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; padding:4px; }
.gallery-item{ position:relative; aspect-ratio:1; background:#111; }
.gallery-item img, .gallery-item video{ width:100%; height:100%; object-fit:cover; }
#fullscreenOverlay { position: fixed; inset: 0; background: black; z-index: 200000; display: none; justify-content: center; align-items: center; }
#fullscreenContent { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
#fullscreenContent img, #fullscreenContent video { max-width: 100%; max-height: 100%; object-fit: contain; }
#closeFullscreen { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: white; font-size: 24px; z-index: 200001; }

/* ロック・読み込み画面 */
#lockOverlay { position:fixed; inset:0; background:black; z-index:999999; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; }
</style>
</head>
<body>

<!-- 最初は「確認中」を表示 -->
<div id="lockOverlay">
  <div id="lockIcon" style="font-size:60px; margin-bottom:20px;">🔄</div>
  <h2 id="lockTitle">確認中...</h2>
  <p id="lockMsg" style="opacity:0.6; margin-top:15px;">権限を確認しています</p>
</div>

<div class="top-bar">
  <button class="icon-btn" onclick="flipCamera()">🔄</button>
  <div id="timer">00:00</div>
  <div id="clock">00:00:00</div>
</div>

<div id="status"></div>
<video id="video" autoplay playsinline muted></video>

<div class="zoom-wrap">
  <div id="zoomText">1.0 x</div>
  <input type="range" id="zoomSlider" min="1" max="10" step="0.1" value="1">
</div>

<div class="bottom">
  <div class="mode">
    <button id="photoBtn" class="active">写真</button>
    <button id="videoBtn">ビデオ</button>
  </div>
  <div class="bottom-row">
    <div id="galleryPreview"><img id="lastMedia"></div>
    <button id="shutter"></button>
  </div>
</div>

<div id="galleryModal">
  <div id="galleryHeader"><div>ギャラリー</div><button id="closeGallery" class="icon-btn">✕</button></div>
  <div id="galleryGrid"></div>
</div>

<div id="fullscreenOverlay">
  <button id="closeFullscreen">✕</button>
  <div id="fullscreenContent"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwD1FQDGQD5frhMpZVM1MBSboUm3-1pQEEkWEggOMdBwh55SpniGxQRB71VbT3g28YPgw/exec";

/* =========================================
   権限チェック (GitHubからGASを呼ぶ)
========================================= */
async function checkPermission() {
  try {
    const response = await fetch(SCRIPT_URL);
    const data = await response.json();
    
    if (data.allowed === true) {
      // 許可されている場合：ロックを消してカメラ起動
      document.getElementById("lockOverlay").style.display = "none";
      startCamera();
    } else {
      // 拒否されている場合：ロック画面を表示
      document.getElementById("lockIcon").innerText = "🔒";
      document.getElementById("lockTitle").innerText = "アクセス制限中";
      document.getElementById("lockMsg").innerHTML = "スプレッドシートのB1セルを<br>TRUEにしてください";
    }
  } catch (e) {
    document.getElementById("lockTitle").innerText = "通信エラー";
    document.getElementById("lockMsg").innerText = "GASの接続を確認してください";
  }
}

// ページ読み込み時に実行
checkPermission();

/* =========================================
   DOM要素・変数
========================================= */
const video = document.getElementById("video");
const shutter = document.getElementById("shutter");
const timer = document.getElementById("timer");
const statusBox = document.getElementById("status");
const zoomSlider = document.getElementById("zoomSlider");
const zoomText = document.getElementById("zoomText");
const photoBtn = document.getElementById("photoBtn");
const videoBtn = document.getElementById("videoBtn");
const lastMedia = document.getElementById("lastMedia");
const galleryPreview = document.getElementById("galleryPreview");
const galleryModal = document.getElementById("galleryModal");
const galleryGrid = document.getElementById("galleryGrid");
const closeGallery = document.getElementById("closeGallery");
const fullscreenOverlay = document.getElementById("fullscreenOverlay");
const fullscreenContent = document.getElementById("fullscreenContent");

let currentMode = "photo";
let currentStream = null;
let facingMode = "environment";
let mediaRecorder;
let isRecording = false;
let recordStart;
let timerInterval;
let mediaList = [];

setInterval(() => {
  document.getElementById("clock").innerText = new Date().toLocaleTimeString("ja-JP",{hour12:false});
},1000);

/* =========================================
   カメラ機能
========================================= */
async function startCamera(){
  if(currentStream){ currentStream.getTracks().forEach(track => track.stop()); }
  try{
    currentStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facingMode, width:{ideal:1920}, height:{ideal:1080}},
      audio:true
    });
    video.srcObject = currentStream;
  }catch(error){ showStatus("カメラを起動できません"); }
}

function flipCamera(){
  if(isRecording) return;
  facingMode = (facingMode === "environment") ? "user" : "environment";
  startCamera();
}

photoBtn.onclick = () => {
  if(isRecording) return;
  currentMode = "photo";
  photoBtn.classList.add("active");
  videoBtn.classList.remove("active");
  shutter.classList.remove("video");
};
videoBtn.onclick = () => {
  if(isRecording) return;
  currentMode = "video";
  videoBtn.classList.add("active");
  photoBtn.classList.remove("active");
  shutter.classList.add("video");
};

galleryPreview.onclick = () => { galleryModal.style.display = "flex"; };
closeGallery.onclick = () => { galleryModal.style.display = "none"; };

shutter.onclick = () => {
  if(currentMode === "photo") takePhoto();
  else toggleRecording();
};

async function takePhoto(){
  document.body.style.opacity = "0.7";
  setTimeout(() => { document.body.style.opacity = "1"; },100);
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  const zoom = parseFloat(zoomSlider.value);
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(zoom, zoom);
  ctx.drawImage(video, -canvas.width / 2, -canvas.height / 2, canvas.width, canvas.height);
  ctx.restore();
  const dataURL = canvas.toDataURL("image/jpeg", 0.8);
  lastMedia.src = dataURL;
  mediaList.unshift({ type:"image", src:dataURL });
  renderGallery();
  uploadFile({ name: "IMG_" + Date.now() + ".jpg", type:"image/jpeg", file:dataURL.split(",")[1] });
}

function toggleRecording(){ if(!isRecording) startRecording(); else stopRecording(); }
function startRecording(){
  const chunks = [];
  mediaRecorder = new MediaRecorder(currentStream);
  mediaRecorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    const blob = new Blob(chunks, {type:"video/webm"});
    const videoURL = URL.createObjectURL(blob);
    lastMedia.src = videoURL;
    mediaList.unshift({ type:"video", src:videoURL });
    renderGallery();
    const reader = new FileReader();
    reader.onloadend = () => {
      uploadFile({ name: "VID_" + Date.now() + ".webm", type:"video/webm", file:reader.result.split(",")[1] });
    };
    reader.readAsDataURL(blob);
  };
  mediaRecorder.start();
  isRecording = true;
  recordStart = Date.now();
  shutter.classList.add("recording");
  timer.style.display = "block";
  timerInterval = setInterval(() => {
    const sec = Math.floor((Date.now() - recordStart) / 1000);
    timer.innerText = String(Math.floor(sec/60)).padStart(2,"0") + ":" + String(sec%60).padStart(2,"0");
  }, 1000);
  showStatus("🎥 録画中...");
}
function stopRecording(){
  mediaRecorder.stop();
  isRecording = false;
  shutter.classList.remove("recording");
  timer.style.display = "none";
  clearInterval(timerInterval);
}

async function uploadFile(data) {
  showStatus("⬆ 保存中...");
  try {
    const res = await fetch(SCRIPT_URL, { method:"POST", body:JSON.stringify(data) });
    const result = await res.json();
    if(result.success) showStatus("✅ 保存完了");
  } catch(e) { showStatus("❌ 保存失敗"); }
}

function renderGallery(){
  galleryGrid.innerHTML = "";
  mediaList.forEach(media => {
    const item = document.createElement("div");
    item.className = "gallery-item";
    item.innerHTML = media.type === "image" ? `<img src="${media.src}">` : `<video src="${media.src}" muted></video>`;
    item.onclick = () => {
      fullscreenContent.innerHTML = "";
      if(media.type === "image") {
        const img = document.createElement("img"); img.src = media.src; fullscreenContent.appendChild(img);
      } else {
        const vid = document.createElement("video"); vid.src = media.src; vid.controls = true; vid.autoplay = true; fullscreenContent.appendChild(vid);
      }
      fullscreenOverlay.style.display = "flex";
    };
    galleryGrid.appendChild(item);
  });
}

document.getElementById("closeFullscreen").onclick = () => { fullscreenOverlay.style.display = "none"; };
zoomSlider.oninput = () => {
  const v = parseFloat(zoomSlider.value).toFixed(1);
  video.style.transform = `scale(${v})`;
  zoomText.innerText = v + " x";
};
function showStatus(msg){
  statusBox.innerText = msg; statusBox.style.display = "block";
  clearTimeout(statusBox.timer);
  statusBox.timer = setTimeout(() => { statusBox.style.display = "none"; }, 3000);
}
</script>
</body>
</html>
