<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no">

<title>Drive Camera</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

/* =========================
   VIDEO
========================= */

#video{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:1;
  transition:transform 0.1s linear;
  background:black;
}

/* =========================
   TOP
========================= */

.top-bar{

  position:fixed;

  top:0;
  left:0;

  width:100%;

  z-index:20;

  display:flex;

  justify-content:space-between;
  align-items:center;

  padding:
    calc(env(safe-area-inset-top) + 15px)
    20px
    0;
}

#clock,
#timer{

  color:white;

  font-size:16px;
  font-weight:bold;

  text-shadow:0 0 10px black;
}

#timer{

  background:red;

  padding:6px 14px;

  border-radius:999px;

  display:none;
}

/* =========================
   BUTTON
========================= */

.icon-btn{

  width:50px;
  height:50px;

  border:none;

  border-radius:50%;

  background:rgba(255,255,255,0.15);

  color:white;

  font-size:24px;

  backdrop-filter:blur(10px);

  cursor:pointer;
}

/* =========================
   STATUS
========================= */

#status{

  position:fixed;

  top:120px;
  left:50%;

  transform:translateX(-50%);

  background:rgba(0,0,0,0.8);

  color:white;

  padding:12px 20px;

  border-radius:20px;

  z-index:999;

  font-size:14px;

  display:none;
}

/* =========================
   ZOOM
========================= */

.zoom-wrap{

  position:fixed;

  bottom:180px;

  width:100%;

  z-index:20;

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:10px;
}

#zoomText{

  background:rgba(0,0,0,0.5);

  color:#ffdb00;

  padding:6px 16px;

  border-radius:999px;

  font-weight:bold;
}

#zoomSlider{

  width:70%;
  max-width:300px;
}

/* =========================
   BOTTOM
========================= */

.bottom{

  position:fixed;

  bottom:0;
  left:0;

  width:100%;

  z-index:20;

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:20px;

  padding-bottom:
    calc(env(safe-area-inset-bottom) + 20px);

  background:
    linear-gradient(
      transparent,
      rgba(0,0,0,0.7)
    );
}

.mode{

  display:flex;

  gap:40px;
}

.mode button{

  background:none;

  border:none;

  color:rgba(255,255,255,0.5);

  font-size:16px;

  font-weight:bold;
}

.mode button.active{
  color:#ffdb00;
}

/* =========================
   SHUTTER
========================= */

#shutter{

  width:85px;
  height:85px;

  border-radius:50%;

  border:6px solid white;

  background:white;

  margin-bottom:20px;

  position:relative;

  cursor:pointer;
}

#shutter.video{
  background:transparent;
}

#shutter.video::after{

  content:"";

  position:absolute;

  width:48px;
  height:48px;

  background:red;

  border-radius:50%;

  top:12px;
  left:12px;
}

#shutter.recording::after{

  width:28px;
  height:28px;

  border-radius:8px;

  top:22px;
  left:22px;
}

/* =========================
   LOCK
========================= */

#lock{

  position:fixed;

  inset:0;

  background:black;

  color:white;

  z-index:99999;

  display:none;

  justify-content:center;
  align-items:center;

  font-size:24px;
}

</style>
</head>
<body>

<!-- ===================== -->
<!-- LOCK -->
<!-- ===================== -->

<div id="lock">
  使用停止中
</div>

<!-- ===================== -->
<!-- TOP -->
<!-- ===================== -->

<div class="top-bar">

  <button class="icon-btn"
          onclick="flipCamera()">
    🔄
  </button>

  <div id="timer">
    00:00
  </div>

  <div id="clock">
    00:00:00
  </div>

</div>

<!-- ===================== -->
<!-- STATUS -->
<!-- ===================== -->

<div id="status"></div>

<!-- ===================== -->
<!-- VIDEO -->
<!-- ===================== -->

<video id="video"
       autoplay
       playsinline
       muted>
</video>

<!-- ===================== -->
<!-- ZOOM -->
<!-- ===================== -->

<div class="zoom-wrap">

  <div id="zoomText">
    1.0 x
  </div>

  <input type="range"
         id="zoomSlider"
         min="1"
         max="10"
         step="0.1"
         value="1">

</div>

<!-- ===================== -->
<!-- BOTTOM -->
<!-- ===================== -->

<div class="bottom">

  <div class="mode">

    <button id="photoBtn"
            class="active">
      写真
    </button>

    <button id="videoBtn">
      ビデオ
    </button>

  </div>

  <button id="shutter"></button>

</div>

<script>

/* =========================================
   Apps Script URL
========================================= */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwW-3Lo7sZDBjmrzeZr3FfWbHeINwLi_dWGbsOIU-fkU9eFI0BsLqyk2Lsp8JXaPvDpRQ/exec";

/* =========================================
   ELEMENT
========================================= */

const video =
document.getElementById("video");

const shutter =
document.getElementById("shutter");

const timer =
document.getElementById("timer");

const statusBox =
document.getElementById("status");

const zoomSlider =
document.getElementById("zoomSlider");

const zoomText =
document.getElementById("zoomText");

const photoBtn =
document.getElementById("photoBtn");

const videoBtn =
document.getElementById("videoBtn");

/* =========================================
   STATE
========================================= */

let currentMode = "photo";

let currentStream = null;

let facingMode = "environment";

let mediaRecorder;

let isRecording = false;

let recordStart;

let timerInterval;

let initialPinchDistance = null;

/* =========================================
   CLOCK
========================================= */

setInterval(() => {

  document.getElementById("clock")
    .innerText =
      new Date()
      .toLocaleTimeString(
        "ja-JP",
        {hour12:false}
      );

},1000);

/* =========================================
   START CAMERA
========================================= */

startCamera();

async function startCamera(){

  if(currentStream){

    currentStream
      .getTracks()
      .forEach(track => track.stop());

  }

  try{

    currentStream =
      await navigator
      .mediaDevices
      .getUserMedia({

        video:{
          facingMode:facingMode,
          width:{ideal:1920},
          height:{ideal:1080}
        },

        audio:true

      });

    video.srcObject =
      currentStream;

  }catch(error){

    showStatus(
      "カメラ起動エラー"
    );

  }

}

/* =========================================
   FLIP CAMERA
========================================= */

function flipCamera(){

  if(isRecording) return;

  facingMode =
    facingMode === "environment"
    ? "user"
    : "environment";

  startCamera();

}

/* =========================================
   MODE
========================================= */

photoBtn.onclick = () => {

  if(isRecording) return;

  currentMode = "photo";

  photoBtn.classList.add("active");

  videoBtn.classList.remove("active");

  shutter.classList.remove("video");

};

videoBtn.onclick = () => {

  if(isRecording) return;

  currentMode = "video";

  videoBtn.classList.add("active");

  photoBtn.classList.remove("active");

  shutter.classList.add("video");

};

/* =========================================
   SHUTTER
========================================= */

shutter.onclick = () => {

  if(currentMode === "photo"){

    takePhoto();

  }else{

    toggleRecording();

  }

};

/* =========================================
   PHOTO
========================================= */

async function takePhoto(){

  // シャッター演出

  document.body.style.opacity = "0.7";

  setTimeout(() => {

    document.body.style.opacity = "1";

  },100);

  // バイブ

  if(navigator.vibrate){

    navigator.vibrate(100);

  }

  showStatus(
    "📸 撮影中..."
  );

  // =====================
  // CANVAS
  // =====================

  const canvas =
    document.createElement("canvas");

  canvas.width =
    video.videoWidth;

  canvas.height =
    video.videoHeight;

  const ctx =
    canvas.getContext("2d");

  // =====================
  // ZOOM
  // =====================

  const zoom =
    parseFloat(
      zoomSlider.value
    );

  ctx.save();

  ctx.translate(
    canvas.width / 2,
    canvas.height / 2
  );

  ctx.scale(zoom, zoom);

  ctx.drawImage(

    video,

    -canvas.width / 2,
    -canvas.height / 2,

    canvas.width,
    canvas.height

  );

  ctx.restore();

  // =====================
  // BASE64
  // =====================

  const base64 =
    canvas
      .toDataURL(
        "image/jpeg",
        0.92
      )
      .split(",")[1];

  // =====================
  // DATA
  // =====================

  const data = {

    name:
      "IMG_" +
      Date.now() +
      ".jpg",

    type:"image/jpeg",

    file:base64

  };

  // =====================
  // AUTO UPLOAD
  // =====================

  try{

    showStatus(
      "⬆ Google Drive保存中..."
    );

    const response =
      await fetch(
        SCRIPT_URL,
        {

          method:"POST",

          body:JSON.stringify(data)

        }
      );

    const result =
      await response.json();

    if(result.success){

      showStatus(
        "✅ 自動保存完了"
      );

    }else{

      showStatus(
        "❌ 保存失敗"
      );

    }

  }catch(error){

    showStatus(
      "❌ 通信エラー"
    );

  }

}

/* =========================================
   VIDEO
========================================= */

function toggleRecording(){

  if(!isRecording){

    startRecording();

  }else{

    stopRecording();

  }

}

function startRecording(){

  const chunks = [];

  mediaRecorder =
    new MediaRecorder(
      currentStream
    );

  mediaRecorder.ondataavailable =
    e => {

      if(e.data.size > 0){

        chunks.push(e.data);

      }

    };

  mediaRecorder.onstop =
    async () => {

      const blob =
        new Blob(
          chunks,
          {
            type:"video/webm"
          }
        );

      const reader =
        new FileReader();

      reader.onloadend =
        async () => {

          const base64 =
            reader.result
              .split(",")[1];

          const data = {

            name:
              "VID_" +
              Date.now() +
              ".webm",

            type:"video/webm",

            file:base64

          };

          try{

            await fetch(
              SCRIPT_URL,
              {

                method:"POST",

                body:JSON.stringify(data)

              }
            );

            showStatus(
              "✅ 動画保存完了"
            );

          }catch(error){

            showStatus(
              "❌ 動画保存失敗"
            );

          }

        };

      reader.readAsDataURL(blob);

    };

  mediaRecorder.start();

  isRecording = true;

  recordStart =
    Date.now();

  shutter.classList.add(
    "recording"
  );

  timer.style.display =
    "block";

  timerInterval =
    setInterval(
      updateTimer,
      1000
    );

  showStatus(
    "🎥 録画開始"
  );

}

function stopRecording(){

  mediaRecorder.stop();

  isRecording = false;

  shutter.classList.remove(
    "recording"
  );

  timer.style.display =
    "none";

  clearInterval(
    timerInterval
  );

  showStatus(
    "🎥 録画終了"
  );

}

function updateTimer(){

  const sec =
    Math.floor(
      (
        Date.now() -
        recordStart
      ) / 1000
    );

  const m =
    String(
      Math.floor(sec / 60)
    ).padStart(2,"0");

  const s =
    String(
      sec % 60
    ).padStart(2,"0");

  timer.innerText =
    `${m}:${s}`;

}

/* =========================================
   ZOOM
========================================= */

zoomSlider.oninput = () => {

  applyZoom(
    zoomSlider.value
  );

};

function applyZoom(v){

  const value =
    parseFloat(v)
    .toFixed(1);

  video.style.transform =
    `scale(${value})`;

  zoomText.innerText =
    value + " x";

}

zoomText.onclick = () => {

  zoomSlider.value = 1;

  applyZoom(1);

};

/* =========================================
   PINCH ZOOM
========================================= */

window.addEventListener(

  "touchstart",

  e => {

    if(e.touches.length === 2){

      initialPinchDistance =
        Math.hypot(

          e.touches[0].pageX -
          e.touches[1].pageX,

          e.touches[0].pageY -
          e.touches[1].pageY

        );

    }

  },

  {passive:false}

);

window.addEventListener(

  "touchmove",

  e => {

    if(
      e.touches.length === 2 &&
      initialPinchDistance
    ){

      const dist =
        Math.hypot(

          e.touches[0].pageX -
          e.touches[1].pageX,

          e.touches[0].pageY -
          e.touches[1].pageY

        );

      let value =
        parseFloat(
          zoomSlider.value
        );

      value +=
        (
          dist -
          initialPinchDistance
        ) / 150;

      value =
        Math.max(
          1,
          Math.min(10,value)
        );

      zoomSlider.value =
        value;

      applyZoom(value);

      initialPinchDistance =
        dist;

    }

  },

  {passive:false}

);

/* =========================================
   STATUS
========================================= */

function showStatus(msg){

  statusBox.innerText =
    msg;

  statusBox.style.display =
    "block";

  clearTimeout(
    statusBox.timer
  );

  statusBox.timer =
    setTimeout(() => {

      statusBox.style.display =
        "none";

    },3000);

}

</script>
</body>
</html>
